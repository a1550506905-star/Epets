<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title></title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: transparent; }
    body { font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; font-size: 13px; color: #444; }
    .window-container {
      width: 100%; height: 100%; display: flex; flex-direction: column;
      border-radius: 14px; background: #fff;
      border: 1px solid rgba(0,0,0,0.08); overflow: hidden;
    }
    .window-header {
      display: flex; justify-content: space-between; align-items: center;
      height: 36px; padding: 0 8px;
      -webkit-app-region: drag; background: #fff;
      border-bottom: 1px solid rgba(0,0,0,0.06); flex-shrink: 0;
    }
    .date-label { font-size: 14px; font-weight: 600; color: #333; margin-left: 8px; }
    .header-actions { display: flex; gap: 4px; -webkit-app-region: no-drag; }
    .header-actions button {
      width: 28px; height: 28px; border: none; border-radius: 8px;
      background: rgba(0,0,0,0.04); color: #999; font-size: 16px; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .header-actions button:hover { background: rgba(0,0,0,0.08); color: #555; }
    .header-actions button.pinned { background: #e8f0ff; color: #48e; }
    .btn-close:hover { background: rgba(255,80,80,0.2) !important; color: #e44 !important; }
    .window-body { flex: 1; overflow-y: auto; padding: 12px 16px; }
    .task-list { min-height: 60px; }
    .task-item { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #f5f5f5; gap: 10px; }
    .task-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #4a8; flex-shrink: 0; }
    .task-item .task-text { flex: 1; font-size: 14px; color: #444; }
    .task-item.done .task-text { color: #aaa; text-decoration: line-through; }
    .task-item .task-time { font-size: 11px; color: #bbb; min-width: 50px; text-align: right; }
    .today-summary { margin-top: 12px; padding: 10px; background: #f9fafb; border-radius: 8px; font-size: 12px; color: #888; line-height: 1.6; display: none; }
    .today-summary.has-content { display: block; }
    .today-summary .summary-label { font-size: 11px; color: #aaa; margin-bottom: 4px; }
    .ai-summary { margin-top: 8px; padding: 10px; background: #f5f0ff; border-radius: 8px; font-size: 12px; color: #666; line-height: 1.7; display: none; }
    .ai-summary.has-content { display: block; }
    .ai-summary .ai-label { font-size: 11px; color: #a8f; margin-bottom: 4px; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.08); border-radius: 3px; }
  </style>
</head>
<body>
  <div class="window-container">
    <div class="window-header">
      <span class="date-label" id="today-date"></span>
      <div class="header-actions">
        <button id="btn-pin" title="置顶">&#x1F4CC;</button>
        <button id="btn-settings" title="任务设置">&#x2699;</button>
        <button id="btn-minimize" title="最小化">─</button>
        <button class="btn-close" title="关闭">&times;</button>
      </div>
    </div>
    <div class="window-body">
      <div class="task-list" id="task-list"></div>
      <div class="today-summary" id="today-summary">
        <div class="summary-label">我的总结</div>
        <div id="summary-text"></div>
      </div>
      <div class="ai-summary" id="ai-summary">
        <div class="ai-label" id="ai-label"></div>
        <div id="ai-summary-text"></div>
      </div>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
