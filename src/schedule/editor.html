<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title></title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: transparent; }
    body { font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; font-size: 13px; color: #444; }
    .window-container {
      width: 100%; height: 100%; display: flex; flex-direction: column;
      border-radius: 14px; background: #fff;
      border: 1px solid rgba(0,0,0,0.08); overflow: hidden;
    }
    .window-header {
      display: flex; justify-content: space-between; align-items: center;
      height: 36px; padding: 0 8px;
      -webkit-app-region: drag; background: #fff;
      border-bottom: 1px solid rgba(0,0,0,0.06); flex-shrink: 0;
    }
    .window-header h3 { font-size: 14px; color: #333; margin-left: 8px; }
    .header-actions { display: flex; gap: 4px; -webkit-app-region: no-drag; }
    .header-actions button {
      width: 28px; height: 28px; border: none; border-radius: 8px;
      background: rgba(0,0,0,0.04); color: #999; font-size: 16px; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .header-actions button:hover { background: rgba(0,0,0,0.08); color: #555; }
    .btn-close:hover { background: rgba(255,80,80,0.2) !important; color: #e44 !important; }
    .window-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
    .tabs { display: flex; gap: 4px; margin-bottom: 12px; }
    .tabs button {
      padding: 5px 16px; border: none; border-radius: 6px;
      background: rgba(0,0,0,0.04); color: #888; font-size: 12px; cursor: pointer;
    }
    .tabs button.active { background: #e8f0ff; color: #48e; }
    .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
    .week-day { border: 1px solid #eee; border-radius: 8px; padding: 8px; min-height: 180px; display: flex; flex-direction: column; }
    .week-day.today { border-color: #48e; background: #f8faff; }
    .week-day .day-label { font-size: 12px; font-weight: 600; color: #888; margin-bottom: 6px; text-align: center; }
    .week-day.today .day-label { color: #48e; }
    .week-day .day-tasks { flex: 1; overflow-y: auto; }
    .mini-task { display: flex; align-items: center; padding: 3px 6px; margin: 2px 0; border-radius: 4px; font-size: 11px; gap: 6px; cursor: pointer; }
    .mini-task:hover { background: #f5f5f5; }
    .mini-task.done .task-label { color: #bbb; text-decoration: line-through; }
    .mini-task .task-label { flex: 1; }
    .mini-task .del-task { color: #ddd; cursor: pointer; font-size: 12px; }
    .mini-task .del-task:hover { color: #e44; }
    .day-bottom { margin-top: 6px; }
    .day-bottom input { width: 100%; padding: 5px 8px; border: 1px solid #e0e0e0; border-radius: 4px; font-size: 11px; outline: none; }
    .day-bottom input:focus { border-color: #69f; }
    .summary-editor { margin-top: 16px; border-top: 2px solid #eee; padding-top: 12px; }
    .summary-editor label { font-size: 13px; font-weight: 600; color: #555; display: block; margin-bottom: 4px; }
    .summary-editor textarea { width: 100%; height: 70px; padding: 10px; border: 1px solid #e0e0e0; border-radius: 6px; font-size: 13px; font-family: inherit; resize: none; outline: none; }
    .summary-editor textarea:focus { border-color: #69f; }
    .summary-editor .row { display: flex; gap: 8px; align-items: center; margin-top: 6px; }
    .summary-editor .row select { padding: 5px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; }
    .summary-editor .row button { padding: 6px 16px; border: 1px solid #d0d0f0; border-radius: 6px; background: #eef; color: #55d; font-size: 12px; cursor: pointer; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.06); border-radius: 3px; }
  </style>
</head>
<body>
  <div class="window-container">
    <div class="window-header">
      <h3>任务规划</h3>
      <div class="header-actions">
        <button id="btn-minimize" title="最小化">─</button>
        <button class="btn-close" title="关闭">&times;</button>
      </div>
    </div>
    <div class="window-body">
      <div class="tabs">
        <button class="active" data-tab="0">本周</button>
        <button data-tab="1">下周</button>
      </div>
      <div class="week-grid" id="week-grid"></div>
      <div class="summary-editor">
        <label>今日总结 <span id="summary-date"></span></label>
        <textarea id="summary-input" placeholder="记录今天完成的事情..."></textarea>
        <div class="row">
          <button id="save-summary-btn">保存总结</button>
          <select id="summary-char-select" style="margin-left:12px;"></select>
          <button id="gen-ai-summary" style="background:#f5f0ff;color:#a6e;border-color:#d0c0f0;">生成AI总结</button>
        </div>
        <div id="gen-status" style="font-size:11px;color:#999;margin-top:4px;"></div>
      </div>
    </div>
  </div>
  <script src="editor.js"></script>
</body>
</html>
