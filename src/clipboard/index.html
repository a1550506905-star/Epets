<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title></title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: transparent; }
    body { font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; font-size: 13px; color: #333; }
    .window-container {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      border-radius: 14px;
      background: #fff;
      border: 1px solid rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .window-header {
      display: flex; justify-content: flex-end; align-items: center;
      height: 36px; padding: 0 8px;
      -webkit-app-region: drag;
      background: #fff;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      flex-shrink: 0;
    }
    .window-header button {
      -webkit-app-region: no-drag;
      width: 28px; height: 28px;
      border: none; border-radius: 8px;
      background: rgba(0,0,0,0.04); color: #999;
      font-size: 16px; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      transition: all 0.15s; margin-left: 4px;
    }
    .window-header button:hover { background: rgba(0,0,0,0.08); color: #555; }
    .btn-close:hover { background: rgba(255,80,80,0.2) !important; color: #e44 !important; }
    .window-body { flex: 1; overflow-y: auto; padding: 16px; }
    h3 { font-size: 14px; margin-bottom: 10px; color: #555; }
    table { width: 100%; border-collapse: collapse; }
    tr { border-bottom: 1px solid #eee; cursor: pointer; }
    tr:hover { background: #f5f8ff; }
    td { padding: 7px 6px; vertical-align: middle; }
    td.text { max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 12px; }
    td.time { width: 110px; color: #999; font-size: 11px; text-align: right; white-space: nowrap; }
    .empty { text-align: center; color: #bbb; padding: 40px; }
    #clear-btn { display: block; width: 100%; margin-top: 12px; padding: 8px; border: 1px solid #ddd; border-radius: 6px; background: #f5f5f5; color: #888; font-size: 12px; cursor: pointer; }
    #clear-btn:hover { background: #fee; border-color: #fcc; color: #c33; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.10); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.20); }
  </style>
</head>
<body>
  <div class="window-container">
    <div class="window-header">
      <button class="btn-minimize" title="最小化">─</button>
      <button class="btn-close" title="关闭">&times;</button>
    </div>
    <div class="window-body">
      <h3>剪贴板历史 (24小时内)</h3>
      <div id="list"></div>
      <button id="clear-btn">清空记录</button>
    </div>
  </div>
  <script>document.querySelector('.btn-close').onclick=()=>window.close();document.querySelector('.btn-minimize').onclick=()=>window.api.minimizeWindow();</script>
  <script src="renderer.js"></script>
</body>
</html>
